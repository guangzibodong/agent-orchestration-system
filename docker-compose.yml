services:
  api:
    build:
      context: .
      target: api
    container_name: mawo-api
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
      MAWO_STATE_BACKEND: ${MAWO_STATE_BACKEND:-file}
      MAWO_QUEUE_BACKEND: ${MAWO_QUEUE_BACKEND:-in_process}
      MAWO_MAX_CONCURRENT_JOBS: ${MAWO_MAX_CONCURRENT_JOBS:-1}
      MAWO_API_REPLICA_COUNT: ${MAWO_API_REPLICA_COUNT:-1}
      MAWO_API_TOKEN: ${MAWO_API_TOKEN:?Set MAWO_API_TOKEN to a long random token before production}
      MAWO_ALLOWED_REPOSITORY_ROOTS: ${MAWO_ALLOWED_REPOSITORY_ROOTS:?Set MAWO_ALLOWED_REPOSITORY_ROOTS to an absolute repository root before production}
      DATABASE_URL: "postgresql://mawo:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before production}@postgres:5432/mawo?schema=public"
      REDIS_URL: redis://redis:6379
      MAWO_CODEX_COMMAND_TEMPLATE: ${MAWO_CODEX_COMMAND_TEMPLATE:-}
      MAWO_CODEX_AUTH_PROBE_COMMAND: ${MAWO_CODEX_AUTH_PROBE_COMMAND:-}
      MAWO_CLAUDE_COMMAND_TEMPLATE: ${MAWO_CLAUDE_COMMAND_TEMPLATE:-}
      MAWO_CLAUDE_AUTH_PROBE_COMMAND: ${MAWO_CLAUDE_AUTH_PROBE_COMMAND:-}
      MAWO_CURSOR_COMMAND_TEMPLATE: ${MAWO_CURSOR_COMMAND_TEMPLATE:-}
      MAWO_CURSOR_AUTH_PROBE_COMMAND: ${MAWO_CURSOR_AUTH_PROBE_COMMAND:-}
    ports:
      - "4000:4000"
    volumes:
      - mawo_state:/app/.mawo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      target: web
    container_name: mawo-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:4000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: mawo-postgres
    environment:
      POSTGRES_DB: mawo
      POSTGRES_USER: mawo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mawo -d mawo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    container_name: mawo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mawo_state:
  postgres_data:
  redis_data:
