name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: mawo
          POSTGRES_USER: mawo
          POSTGRES_PASSWORD: mawo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mawo -d mawo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mawo:mawo@localhost:5432/mawo?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: API smoke
        run: npm run smoke:api

      - name: File backup restore smoke
        run: npm run smoke:backup:restore

      - name: API smoke with Postgres queue worker
        run: npm run smoke:api:postgres

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: UI smoke
        run: npm run smoke:ui

      - name: API smoke with auth token
        run: npm run smoke:api
        env:
          MAWO_API_TOKEN: smoke-secret
