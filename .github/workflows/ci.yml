name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: mawo
          POSTGRES_USER: mawo
          POSTGRES_PASSWORD: mawo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mawo -d mawo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mawo:mawo@localhost:5432/mawo?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: API smoke
        run: npm run smoke:api

      - name: API smoke with Postgres state backend
        run: npm run smoke:api:postgres

      - name: API smoke with auth token
        run: npm run smoke:api
        env:
          MAWO_API_TOKEN: smoke-secret
